  <style>
   
    body {
      font-family: Arial, sans-serif;
      background-color: #dddbdb;
      margin: 0;
      padding: 20px;
    }

    h2 {
      margin-top: 20px;
      font-size: 1.5em;
    }

    .services-box {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .service {
      background-color: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .service img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .service img:hover {
      transform: scale(1.05);
    }

    .lightbox {
      display: none;
      position: fixed;
      z-index: 1000;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }

    .lightbox:target {
      display: flex;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 2rem;
      color: white;
      text-decoration: none;
    }

    .video-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 40px;
    }

    .video-section iframe {
      width: 100%;
      height: 400px;
      border-radius: 10px;
    }

    @media (max-width: 768px) {
      .video-section {
        grid-template-columns: 1fr;
      }
    }

 .lightbox {
  display: none;
  position: fixed;
  z-index: 999999; /* WICHTIG: über allem */
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 0, 0, 0.8);

  align-items: center;
}

/* X BUTTON */

  position: absolute;

}

    /* Grundlayout */
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
}

.navbar {
  background-color: #0d1117;
  color: white;
  position: sticky;
  top: 0;
  width: 100%;
  z-index: 100;
}

.nav-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0.8rem 1.2rem;
}

.logo {
  font-size: 1.4rem;
  font-weight: bold;
  color: #ffffff;
  text-decoration: none;
}

/* Desktop-Menü */
.nav-menu {
  display: flex;
  list-style: none;
  gap: 1.5rem;
}

.nav-link {
  color: white;
  text-decoration: none;
  transition: color 0.3s ease;
}

.nav-link:hover {
  color: #58a6ff;
}

/* Mobile Toggle */
.menu-toggle {
  background: none;
  border: none;
  color: white;
  font-size: 1.8rem;
  cursor: pointer;
  display: none; /* wird mobil eingeblendet */
}

/* Responsives Verhalten */
@media (max-width: 768px) {
  .menu-toggle {
    display: block;
  }

  .nav-menu {
    display: none;
    flex-direction: column;
    position: absolute;
    top: 60px;
    right: 0;
    background-color: #161b22;
    width: 100%;
    text-align: center;
    padding: 1rem 0;
  }

  .nav-menu.active {
    display: flex;
  }

  .nav-link {
    padding: 0.8rem;
    display: block;
  }
}
