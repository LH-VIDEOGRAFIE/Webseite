    body {
      font-family: Arial, sans-serif;
      background-color: #dddbdb;
      margin: 0;
      padding: 20px;
    }

    h2 {
      margin-top: 20px;
      font-size: 1.5em;
    }

    .services-box {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .service {
      background-color: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .service img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .service img:hover {
      transform: scale(1.05);
    }

    .lightbox {
      display: none;
      position: fixed;
      z-index: 1000;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
    }
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 999999;
  background: rgba(0,0,0,0.85);

  justify-content: center;
  align-items: center;

  padding: 20px;
}

.lightbox:target {
  display: flex;
}

.lightbox img {
  display: block;
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
  border-radius: 10px;
  margin: auto;
}

.lightbox-close {
  position: fixed;
  top: 15px;
  right: 20px;
  font-size: 40px;
  color: white;
  text-decoration: none;
  z-index: 1000000;
}

    /* Grundlayout */
