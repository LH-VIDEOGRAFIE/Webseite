  <link rel="stylesheet" href="Kopf.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #dddbdb;
      margin: 0;
      padding: 20px;
    }
h2 { margin-top: 20px;
      font-size: 1.5em;}
      
    .gallery-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      padding: 20px 0;
    }

    .gallery-item {
      background-color: white;
      border: 2px solid white;
      padding: 10px;
      border-radius: 8px;
      width: 150px;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .gallery-item:hover {
      transform: scale(1.05);
    }

    .gallery-item img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* Lightbox styles */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border: 5px solid white;
      border-radius: 10px;
    }

    .lightbox:target {
      display: flex;
    }
    /* Grundlayout */
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
}

  </style>

  <!-- Lightbox Container -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Vergrößertes Logo">
  </div>

  <script>
    function openLightbox(imgSrc) {
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      lightboxImg.src = imgSrc;
      lightbox.style.display = 'flex';
    }

    function closeLightbox() {
      document.getElementById('lightbox').style.display = 'none';
    }
  </script>
