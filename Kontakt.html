        /* Grundlayout */
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
}

.navbar {
  background-color: #0d1117;
  color: white;
  position: sticky;
  top: 0;
  width: 100%;
  z-index: 100;
}

.nav-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0.8rem 1.2rem;
}

.logo {
  font-size: 1.4rem;
  font-weight: bold;
  color: #ffffff;
  text-decoration: none;
}

/* Desktop-Menü */
.nav-menu {
  display: flex;
  list-style: none;
  gap: 1.5rem;
}

.nav-link {
  color: white;
  text-decoration: none;
  transition: color 0.3s ease;
}

.nav-link:hover {
  color: #58a6ff;
}

/* Mobile Toggle */
.menu-toggle {
  background: none;
  border: none;
  color: white;
  font-size: 1.8rem;
  cursor: pointer;
  display: none; /* wird mobil eingeblendet */
}

/* Responsives Verhalten */
@media (max-width: 768px) {
  .menu-toggle {
    display: block;
  }

  .nav-menu {
    display: none;
    flex-direction: column;
    position: absolute;
    top: 60px;
    right: 0;
    background-color: #161b22;
    width: 100%;
    text-align: center;
    padding: 1rem 0;
  }

  .nav-menu.active {
    display: flex;
  }

  .nav-link {
    padding: 0.8rem;
    display: block;
  }
}
